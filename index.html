<!DOCTYPE html>
<html>
<head>
  <title>FPS Boost Pack</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #111827, #0b0b0f);
      color: white;
      text-align: center;
    }

    .banner {
      padding: 60px 20px;
    }

    .title {
      font-size: 38px;
      font-weight: bold;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px #3b82f6; }
      to { text-shadow: 0 0 20px #22c55e; }
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      margin: 15px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    button {
      padding: 12px;
      width: 100%;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .green { background: #22c55e; color: white; }
    .blue { background: #3b82f6; color: white; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      padding: 10px 15px;
      border-radius: 8px;
      opacity: 0;
      transition: 0.3s;
    }

    .show {
      opacity: 1;
    }
  </style>
</head>

<body>

<div class="banner">
  <div class="title">🥔 FPS BOOST PACK</div>
  <p>Performance tool for Roblox</p>
</div>

<div class="container">

  <div class="card">
    <h3>🥔 Potato Mode</h3>
    <p>Maximum FPS, lowest graphics</p>
    <button class="green" onclick="copyPotato()">Copy Config</button>
  </div>

  <div class="card">
    <h3>⚖️ Balanced Mode</h3>
    <p>Good FPS + visuals</p>
    <button class="blue" onclick="copyBalanced()">Copy Config</button>
  </div>

</div>

<div id="toast" class="toast">Copied!</div>

<script>
function showToast(text) {
  const toast = document.getElementById("toast");
  toast.innerText = text;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 1500);
}

function copyPotato() {
  navigator.clipboard.writeText(`
{
  "DFIntTaskSchedulerTargetFps": "60",
  "FIntRenderShadowIntensity": "0",
  "DFIntTextureQualityOverride": "0"
}
  `);
  showToast("🥔 Potato config copied!");
}

function copyBalanced() {
  navigator.clipboard.writeText(`
{
  "DFIntTaskSchedulerTargetFps": "120",
  "FIntRenderShadowIntensity": "0"
}
  `);
  showToast("⚖️ Balanced config copied!");
}
</script>

</body>
</html>
