<!DOCTYPE html>
<html>
<head>
  <title>FPS Boost Pack</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #111827, #0b0b0f);
      color: white;
      text-align: center;
    }

    .banner {
      padding: 50px 20px;
    }

    .title {
      font-size: 38px;
      font-weight: bold;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px #3b82f6; }
      to { text-shadow: 0 0 20px #22c55e; }
    }

    .container {
      max-width: 750px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      margin: 15px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    button {
      padding: 12px;
      width: 100%;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .green { background: #22c55e; color: white; }
    .blue { background: #3b82f6; color: white; }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #111827;
      color: white;
      outline: none;
      box-sizing: border-box;
    }

    input::placeholder {
      color: #9ca3af;
    }

    input:focus {
      border: 1px solid #3b82f6;
    }

    .review {
      background: #222;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      text-align: left;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1f2937;
      padding: 10px 15px;
      border-radius: 8px;
      opacity: 0;
      transition: 0.3s;
    }

    .show {
      opacity: 1;
    }

    .smallbtn {
      width: auto;
      padding: 5px 10px;
      margin-right: 5px;
      margin-top: 5px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="banner">
  <div class="title">🥔 FPS BOOST PACK</div>
  <p>Optimize Roblox performance easily</p>
</div>

<div class="container">

  <!-- MODOS -->
  <div class="card">
    <h3>⚡ Modes</h3>
    <button class="green" onclick="copyPotato()">🥔 Potato Mode</button>
    <button class="blue" onclick="copyBalanced()">⚖️ Balanced Mode</button>
  </div>

  <!-- INFO -->
  <div class="card">
    <h3>🧠 What it does</h3>
    <p>Reduces graphics load and improves FPS stability.</p>
  </div>

  <!-- OPINIÕES -->
  <div class="card">
    <h3>💬 Community Opinions</h3>

    <input id="name" placeholder="Your name">
    <input id="opinion" placeholder="Write your opinion...">

    <button class="green" onclick="addOpinion()">Submit</button>

    <div id="list"></div>
  </div>

</div>

<div id="toast" class="toast">Copied!</div>

<script>
function showToast(text) {
  const toast = document.getElementById("toast");
  toast.innerText = text;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 1500);
}

function copyPotato() {
  navigator.clipboard.writeText(`
{
  "DFIntTaskSchedulerTargetFps": "60",
  "FIntRenderShadowIntensity": "0",
  "DFIntTextureQualityOverride": "0"
}
  `);
  showToast("🥔 Potato copied!");
}

function copyBalanced() {
  navigator.clipboard.writeText(`
{
  "DFIntTaskSchedulerTargetFps": "120",
  "FIntRenderShadowIntensity": "0"
}
  `);
  showToast("⚖️ Balanced copied!");
}

/* OPINIÕES */
function addOpinion() {
  const name = document.getElementById("name").value;
  const text = document.getElementById("opinion").value;

  if (!name || !text) return;

  const div = document.createElement("div");
  div.className = "review";

  div.innerHTML = `
    <b>${name}:</b><br>
    <span class="text">${text}</span><br>

    <button class="smallbtn blue" onclick="editOpinion(this)">Edit</button>
    <button class="smallbtn" style="background:#ef4444;color:white;" onclick="deleteOpinion(this)">Delete</button>
  `;

  document.getElementById("list").appendChild(div);

  document.getElementById("name").value = "";
  document.getElementById("opinion").value = "";
}

function deleteOpinion(btn) {
  btn.parentElement.remove();
}

function editOpinion(btn) {
  const parent = btn.parentElement;
  const textSpan = parent.querySelector(".text");

  const newText = prompt("Edit your opinion:", textSpan.innerText);

  if (newText) {
    textSpan.innerText = newText;
  }
}
</script>

</body>
</html>
</html>
