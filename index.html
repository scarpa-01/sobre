<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mini Social Server</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f17;
  color: white;
}

header {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 15px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 6px;
  border: none;
  background: #111827;
  color: white;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.post {
  background: #111827;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
}

.smallbtn {
  padding: 5px 8px;
  margin-right: 5px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
}

.blue { background: #3b82f6; color: white; }
.red { background: #ef4444; color: white; }

</style>
</head>

<body>

<header>💬 Mini Social Server</header>

<div class="container">

  <div class="card">
    <h3>Criar Post</h3>

    <input id="name" placeholder="Teu nome">
    <textarea id="msg" placeholder="Escreve algo..."></textarea>

    <button class="blue" onclick="addPost()">Postar</button>
  </div>

  <div id="feed"></div>

</div>

<script>

function addPost() {
  let name = document.getElementById("name").value;
  let msg = document.getElementById("msg").value;

  if (!name || !msg) return;

  let div = document.createElement("div");
  div.className = "post";

  div.innerHTML = `
    <b>${name}</b><br><br>
    <span>${msg}</span><br><br>

    <button class="smallbtn blue" onclick="edit(this)">Edit</button>
    <button class="smallbtn red" onclick="this.parentElement.remove()">Delete</button>
  `;

  document.getElementById("feed").prepend(div);

  document.getElementById("msg").value = "";
}

function edit(btn) {
  let post = btn.parentElement;
  let text = post.querySelector("span").innerText;

  let newText = prompt("Edit post:", text);

  if (newText) {
    post.querySelector("span").innerText = newText;
  }
}

</script>

</body>
</html>
