<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Hub</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  background: #0b0f17;
  color: white;
  transition: 0.3s;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 15px;
}

/* CARD */
.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 15px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  background: #111827;
  color: white;
}

/* MEMBER */
.member {
  background: #111827;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
}

/* SETTINGS BOX */
#settingsBox {
  display: none;
  margin-top: 10px;
  background: #111827;
  padding: 10px;
  border-radius: 10px;
}

/* LIGHT MODE */
.light {
  background: #f3f4f6;
  color: black;
}

.light .card {
  background: white;
  color: black;
}

.light input {
  background: #e5e7eb;
  color: black;
}

.light .member {
  background: #e5e7eb;
}

.light #settingsBox {
  background: #e5e7eb;
}
</style>
</head>

<body>

<header>Community Hub</header>

<div class="container">

  <!-- 👤 PROFILE -->
  <div class="card">
    <h3>👤 Perfil</h3>

    <p>Nome: <b id="userDisplay">Anónimo</b></p>
    <p>Estado: 🟢 Online</p>

    <input id="profileName" placeholder="Mudar nome">
    <button onclick="saveProfile()">💾 Guardar perfil</button>
  </div>

  <!-- 🔗 LINKS -->
  <div class="card">
    <h3>🔗 Liga-te</h3>

    <button onclick="window.open('https://discord.com','_blank')">
      Discord
    </button>

    <button onclick="window.open('https://youtube.com','_blank')">
      YouTube
    </button>

    <button onclick="toggleSettings()">⚙️ Definições</button>

    <!-- SETTINGS -->
    <div id="settingsBox">
      <button onclick="toggleTheme()">🌙 / ☀️ Tema</button>
      <button onclick="clearMembers()">🧹 Limpar membros</button>
    </div>
  </div>

  <!-- 👥 MEMBERS -->
  <div class="card">
    <h3>👥 Membros</h3>

    <input id="memberName" placeholder="Username">
    <button onclick="addMember()">Adicionar</button>

    <div id="members"></div>
  </div>

</div>

<script>

let members = JSON.parse(localStorage.getItem("members") || "[]");

/* 👤 PROFILE */
function saveProfile() {
  let name = document.getElementById("profileName").value;
  if (!name) return;

  localStorage.setItem("username", name);
  document.getElementById("userDisplay").innerText = name;
  document.getElementById("profileName").value = "";
}

/* carregar perfil */
window.onload = function () {
  let name = localStorage.getItem("username");
  if (name) {
    document.getElementById("userDisplay").innerText = name;
  }

  render();
};

/* 👥 MEMBERS */
function addMember() {
  let name = document.getElementById("memberName").value;
  if (!name) return;

  members.push(name);
  localStorage.setItem("members", JSON.stringify(members));

  document.getElementById("memberName").value = "";
  render();
}

function render() {
  let box = document.getElementById("members");
  box.innerHTML = "";

  members.forEach(m => {
    let div = document.createElement("div");
    div.className = "member";
    div.innerText = "@ " + m;
    box.appendChild(div);
  });
}

/* ⚙️ SETTINGS */
function toggleSettings() {
  let box = document.getElementById("settingsBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

/* 🌙 THEME */
function toggleTheme() {
  document.body.classList.toggle("light");
}

/* 🧹 CLEAR */
function clearMembers() {
  localStorage.removeItem("members");
  location.reload();
}

</script>

</body>
</html>
