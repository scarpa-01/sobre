<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links</title>

<style>
  :root {
    --bg: #0f0f0f;
    --card: #1c1c1c;
    --text: #ffffff;
    --accent: #4f7cff;
  }

  body.light {
    --bg: #f2f2f2;
    --card: #ffffff;
    --text: #111;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    text-align: center;
  }

  .btn {
    display: block;
    margin: 10px;
    padding: 15px 25px;
    background: var(--card);
    color: var(--text);
    text-decoration: none;
    border-radius: 10px;
    transition: 0.2s;
    border: 1px solid transparent;
  }

  .btn:hover {
    border-color: var(--accent);
    transform: scale(1.03);
  }

  .settings {
    position: fixed;
    top: 15px;
    right: 15px;
    background: var(--card);
    padding: 10px;
    border-radius: 10px;
  }

  select, button {
    margin-top: 5px;
    padding: 5px;
  }

  .panel {
    margin-top: 10px;
    display: none;
  }

  .toggle {
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="container">
  <a class="btn" href="https://discord.com" target="_blank">Discord</a>
  <a class="btn" href="https://github.com" target="_blank">GitHub</a>
</div>

<div class="settings">
  <div class="toggle" onclick="togglePanel()">⚙️ Settings</div>

  <div class="panel" id="panel">
    <button onclick="toggleTheme()">Dark / Light</button>

    <br><br>

    <label>Accent color:</label>
    <select onchange="changeColor(this.value)">
      <option value="#4f7cff">Blue</option>
      <option value="#ff4f4f">Red</option>
      <option value="#4fff7c">Green</option>
      <option value="#b84fff">Purple</option>
    </select>
  </div>
</div>

<script>
  // load settings
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
  }

  if (localStorage.getItem("color")) {
    document.documentElement.style.setProperty("--accent", localStorage.getItem("color"));
  }

  function toggleTheme() {
    document.body.classList.toggle("light");

    if (document.body.classList.contains("light")) {
      localStorage.setItem("theme", "light");
    } else {
      localStorage.setItem("theme", "dark");
    }
  }

  function changeColor(color) {
    document.documentElement.style.setProperty("--accent", color);
    localStorage.setItem("color", color);
  }

  function togglePanel() {
    const panel = document.getElementById("panel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
  }
</script>

</body>
</html>
