<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Chat Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f17;
  color: white;
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #111827;
  padding: 10px;
  overflow-y: auto;
}

.channel {
  padding: 10px;
  margin-top: 8px;
  background: #1f2937;
  border-radius: 8px;
  cursor: pointer;
}

.channel:hover {
  background: #3b82f6;
}

/* CHAT */
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 15px;
  background: #111827;
  font-weight: bold;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  background: #1f2937;
  padding: 8px;
  margin-top: 8px;
  border-radius: 8px;
}

/* INPUT */
.inputBox {
  display: flex;
  padding: 10px;
  background: #111827;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #0f172a;
  color: white;
}

button {
  margin-left: 10px;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

/* LOGIN */
.login {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #0b0f17;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.login input {
  width: 200px;
  margin: 5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <h2>Mini Chat Hub</h2>
  <input id="name" placeholder="Nome">
  <input id="emoji" placeholder="Emoji 😎🔥💀">
  <button onclick="enter()">Entrar</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">

  <h3>Salas</h3>
  <div class="channel" onclick="switchRoom('geral')">💬 Geral</div>
  <div class="channel" onclick="switchRoom('random')">🎲 Random</div>

  <hr style="border:1px solid #333;">

  <h4>Amigos</h4>

  <input id="friendName" placeholder="Adicionar amigo">
  <button onclick="addFriend()">Adicionar</button>

  <div id="friendsList"></div>

</div>

<!-- CHAT -->
<div class="chat">

  <div class="header" id="roomName">💬 Geral</div>

  <div class="messages" id="messages"></div>

  <div class="inputBox">
    <input id="msg" placeholder="Escreve mensagem...">
    <button onclick="send()">Enviar</button>
  </div>

</div>

<script>

let user = {};
let room = "geral";

let data = JSON.parse(localStorage.getItem("chat") || "{}");
let friends = JSON.parse(localStorage.getItem("friends") || "[]");

/* ENTRAR */
function enter() {
  let name = document.getElementById("name").value;
  let emoji = document.getElementById("emoji").value;

  if (!name) return;

  user = { name, emoji: emoji || "👤" };

  document.getElementById("login").style.display = "none";

  if (!data[room]) data[room] = [];

  render();
  renderFriends();
}

/* TROCAR SALA */
function switchRoom(r) {
  room = r;
  document.getElementById("roomName").innerText = "💬 " + r;

  if (!data[room]) data[room] = [];

  render();
}

/* ENVIAR MENSAGEM */
function send() {
  let text = document.getElementById("msg").value;
  if (!text) return;

  if (!data[room]) data[room] = [];

  data[room].push({
    user: user.name,
    emoji: user.emoji,
    text: text
  });

  localStorage.setItem("chat", JSON.stringify(data));

  document.getElementById("msg").value = "";

  render();
}

/* MOSTRAR CHAT */
function render() {
  let box = document.getElementById("messages");
  box.innerHTML = "";

  let msgs = data[room] || [];

  msgs.forEach(m => {
    let div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<b>${m.emoji} ${m.user}</b><br>${m.text}`;
    box.appendChild(div);
  });
}

/* AMIGOS */
function addFriend() {
  let name = document.getElementById("friendName").value;
  if (!name) return;

  if (!friends.includes(name)) {
    friends.push(name);
  }
