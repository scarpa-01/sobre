<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Links</title>

<style>
:root{
  --bg1:#0b0f17;
  --bg2:#111a2e;
  --card:rgba(255,255,255,0.06);
  --text:#fff;
  --accent:#4f7cff;
}

body.light{
  --bg1:#f4f6fb;
  --bg2:#e7ebf5;
  --card:rgba(255,255,255,0.85);
  --text:#111;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  color:var(--text);

  min-height:100vh;
  min-height:100dvh; /* FIX MOBILE */
  
  display:flex;
  justify-content:center;
  align-items:center;

  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  overflow:hidden;
}

/* canvas FIX */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* glow */
body::before{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:var(--accent);
  border-radius:50%;
  filter:blur(200px);
  opacity:.18;
  top:-200px;
  left:-200px;
  animation:move 12s ease-in-out infinite;
}

@keyframes move{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(60px,40px);}
}

.container{
  position:relative;
  z-index:2;
  text-align:center;
  animation:fade .6s ease;
  padding:20px;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.title{
  font-size:32px;
  font-weight:700;
}

.status{
  margin:10px 0 22px;
  opacity:.75;
  font-size:14px;
}

.members{
  margin-top:18px;
  font-size:14px;
  opacity:.75;
}

.links{
  display:flex;
  flex-direction:column;
  gap:14px;
  align-items:center;
}

.card{
  width:290px;
  padding:16px;
  border-radius:16px;

  background:var(--card);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08);

  color:var(--text);
  text-decoration:none;
  cursor:pointer;

  transition:.2s ease;
  font-size:16px;
}

.card:hover{
  transform:translateY(-5px);
  border-color:var(--accent);
}

/* SETTINGS */
.settings{
  position:fixed;
  top:calc(env(safe-area-inset-top) + 12px);
  right:12px;
  z-index:5;
}

.gear{
  width:44px;
  height:44px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:12px;
  background:var(--card);
  cursor:pointer;
  backdrop-filter:blur(12px);
}

.panel{
  margin-top:10px;
  display:none;
  background:var(--card);
  padding:12px;
  border-radius:14px;
  backdrop-filter:blur(14px);
  min-width:140px;
}

.panel button,
.panel select{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
}

/* toast */
#toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  background:var(--card);
  padding:12px 18px;
  border-radius:14px;
  opacity:0;
  transition:.3s ease;
  z-index:10;
}

#toast.show{opacity:1;}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

  <div class="title">Links rápidos</div>

  <div class="status">
    🟢 online • <span id="time"></span>
  </div>

  <div class="links">
    <a class="card" href="https://discord.gg/TEU-LINK" target="_blank">💬 Discord</a>

    <button class="card" onclick="copyDiscord()">📋 Copiar link Discord</button>

    <a class="card" href="https://github.com/scarpa-01" target="_blank">🐙 GitHub</a>
  </div>

  <div class="members">
    👥 <span id="memberCount">...</span> membros
  </div>

</div>

<div class="settings">
  <div class="gear" onclick="togglePanel()">⚙️</div>

  <div class="panel" id="panel">
    <button onclick="toggleTheme()">Tema</button>
    <select onchange="changeColor(this.value)">
      <option value="#4f7cff">Azul</option>
      <option value="#ff4f4f">Vermelho</option>
      <option value="#4fff7c">Verde</option>
      <option value="#b84fff">Roxo</option>
    </select>
  </div>
</div>

<div id="toast">✅ Copiado!</div>

<script>

const root = document.documentElement;
const panel = document.getElementById("panel");

/* theme */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* color */
function changeColor(c){
  root.style.setProperty("--accent", c);
}

/* panel */
function togglePanel(){
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

/* toast */
function toast(){
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

/* copy */
function copyDiscord(){
  navigator.clipboard.writeText("https://discord.gg/TEU-LINK");
  toast();
}

/* time */
function updateTime(){
  const now = new Date();
  document.getElementById("time").textContent =
    now.toLocaleTimeString("pt-PT",{hour:"2-digit",minute:"2-digit"});
}
updateTime();
setInterval(updateTime,1000);

/* members */
async function loadMembers(){
  try{
    const res = await fetch("https://discord.com/api/guilds/TEU_SERVER_ID/widget.json");
    const data = await res.json();
    document.getElementById("memberCount").textContent = data.presence_count;
  }catch{
    document.getElementById("memberCount").textContent = "?";
  }
}
loadMembers();

/* PARTICLES FIXED */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let particles = [];

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  particles = [];
  for(let i=0;i<50;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*1.6,
      dx:(Math.random()-0.5)*0.25,
      dy:(Math.random()-0.5)*0.25
    });
  }
}

window.addEventListener("resize", resize);
window.addEventListener("orientationchange", resize);
resize();

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let p of particles){
    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0) p.x=canvas.width;
    if(p.x>canvas.width) p.x=0;
    if(p.y<0) p.y=canvas.height;
    if(p.y>canvas.height) p.y=0;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.25)";
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
