<!DOCTYPE html>
<html>
<head>
  <title>Roblox FPS Boost</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 50px;
    }

    .box {
      background: #1c1c1c;
      padding: 25px;
      border-radius: 12px;
      display: inline-block;
      width: 360px;
    }

    h1 { margin-bottom: 5px; }

    .desc {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .section {
      text-align: left;
      margin: 15px 0;
      padding: 10px;
      background: #222;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .green { background: #22c55e; color: white; }
    .blue { background: #3b82f6; color: white; }

    .small {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="box">

  <h1>🥔 FPS Boost Tool</h1>
  <div class="desc">Improve Roblox performance on low-end PCs</div>

  <div class="section">
    <b>🥔 Potato Mode</b>
    <div class="small">Lowest graphics, maximum FPS stability</div>
    <button class="green" onclick="copyPotato()">Copy Potato Config</button>
  </div>

  <div class="section">
    <b>⚖️ Balanced Mode</b>
    <div class="small">Good FPS + normal visuals</div>
    <button class="blue" onclick="copyBalanced()">Copy Balanced Config</button>
  </div>

</div>

<script>
function copyPotato() {
  prompt("Copy this config:", `
{
  "DFIntTaskSchedulerTargetFps": "60",
  "FIntRenderShadowIntensity": "0",
  "DFIntTextureQualityOverride": "0"
}
  `);
}

function copyBalanced() {
  prompt("Copy this config:", `
{
  "DFIntTaskSchedulerTargetFps": "120",
  "FIntRenderShadowIntensity": "0"
}
  `);
}
</script>

</body>
</html>
