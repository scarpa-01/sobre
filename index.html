<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Game Hub</title>

<style>
:root{
  --bg1:#0b0f17;
  --bg2:#111a2e;
  --card:rgba(255,255,255,0.06);
  --text:#fff;
  --accent:#4f7cff;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:system-ui;
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  font-size:18px;
}

.container{
  text-align:center;
  padding:20px;
  width:100%;
  max-width:420px;
}

.title{
  font-size:38px;
  font-weight:800;
  margin-bottom:8px;
}

.subtitle{
  opacity:.7;
  font-size:14px;
  margin-bottom:25px;
}

.section{
  margin-top:20px;
  font-size:14px;
  opacity:.6;
}

/* cards */
.card{
  display:block;
  width:100%;
  padding:18px;
  margin:12px 0;
  border-radius:16px;
  background:var(--card);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);
  color:var(--text);
  text-decoration:none;
  font-size:18px;
  transition:.2s;
}

.card:hover{
  transform:scale(1.03);
  border-color:var(--accent);
}

/* github highlight */
.github{
  border:1px solid var(--accent);
}

/* mobile fix */
@media (max-width:600px){
  .title{font-size:44px;}
  .card{font-size:20px;}
}
</style>
</head>

<body>

<div class="container">

  <div class="title">🎮 Game Hub</div>
  <div class="subtitle">Os meus jogos em ZIP</div>

  <div class="section">🎮 JOGOS</div>

  <a class="card" href="farm_life.zip" download>
    🌾 Farm Life PRO<br>⬇️ Baixar ZIP
  </a>

  <a class="card" href="game2.zip" download>
    🚀 Space Game<br>⬇️ Baixar ZIP
  </a>

  <div class="section">🔗 LINKS</div>

  <a class="card github" href="https://github.com/scarpa-01" target="_blank">
    🐙 Meu GitHub
  </a>

</div>

</body>
</html>
