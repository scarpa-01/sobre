<!DOCTYPE html>
<html>
<head>
  <title>FPS Boost Pack</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0f;
      color: white;
    }

    .banner {
      background: linear-gradient(90deg, #1b1b2f, #16213e);
      padding: 40px;
      text-align: center;
    }

    .title {
      font-size: 32px;
      font-weight: bold;
    }

    .subtitle {
      opacity: 0.7;
      margin-top: 5px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1c1c25;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .green { background: #22c55e; color: white; }
    .blue { background: #3b82f6; color: white; }

    .tag {
      display: inline-block;
      background: #333;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="banner">
  <div class="title">🥔 FPS Boost Pack</div>
  <div class="subtitle">Optimize Roblox performance for low-end PCs</div>
  <div class="tag">Free Tool • Community Configs</div>
</div>

<div class="container">

  <div class="card">
    <h3>🥔 Potato Mode</h3>
    <p>Maximum FPS, lowest graphics. Best for weak PCs.</p>
    <button class="green" onclick="copyPotato()">Download / Copy Config</button>
  </div>

  <div class="card">
    <h3>⚖️ Balanced Mode</h3>
    <p>Good FPS with normal visuals.</p>
    <button class="blue" onclick="copyBalanced()">Download / Copy Config</button>
  </div>

  <div class="card">
    <h3>⚔️ Competitive Mode</h3>
    <p>Stable FPS for PvP games like battlegrounds.</p>
  </div>

</div>

<script>
function copyPotato() {
  prompt("Copy this config:", `
{
  "DFIntTaskSchedulerTargetFps": "60",
  "FIntRenderShadowIntensity": "0",
  "DFIntTextureQualityOverride": "0"
}
  `);
}

function copyBalanced() {
  prompt("Copy this config:", `
{
  "DFIntTaskSchedulerTargetFps": "120",
  "FIntRenderShadowIntensity": "0"
}
  `);
}
</script>

</body>
</html>
