<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Hub</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  background: #0b0f17;
  color: white;
  transition: 0.3s;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 800px;
  margin: auto;
  padding: 15px;
}

/* CARD */
.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  transition: 0.3s;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  background: #111827;
  color: white;
}

/* MEMBER */
.member {
  background: #111827;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
}

/* SETTINGS */
.settings {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  background: #111827;
}

/* LIGHT MODE */
.light {
  background: #f3f4f6;
  color: black;
}

.light .card {
  background: white;
  color: black;
}

.light input {
  background: #e5e7eb;
  color: black;
}

.light .member {
  background: #e5e7eb;
}
</style>
</head>

<body>

<header>Community Hub</header>

<div class="container">

  <!-- SETTINGS -->
  <div class="card">
    <h3>⚙️ Definições</h3>

    <button onclick="toggleTheme()">🌙 / ☀️ Modo Escuro</button>

    <div class="settings">
      <h4>ℹ️ Sobre o site</h4>
      <p>
        Este é um site de comunidade simples com membros e ligação a conteúdos.
      </p>
    </div>
  </div>

  <!-- ADD MEMBER -->
  <div class="card">
    <h3>Adicionar membro</h3>
    <input id="memberName" placeholder="Username">
    <button onclick="addMember()">Adicionar</button>
  </div>

  <!-- MEMBERS -->
  <div class="card">
    <h3>Membros</h3>
    <div id="members"></div>
  </div>

</div>
