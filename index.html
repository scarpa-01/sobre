<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Hub</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  background: #0b0f17;
  color: white;
}

/* LOGIN */
#login {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.loginBox {
  background: #1f2937;
  padding: 20px;
  border-radius: 14px;
  width: 300px;
}

/* APP */
#app {
  display: none;
  max-width: 800px;
  margin: auto;
  padding: 15px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 14px;
  margin-bottom: 15px;
}

/* INPUT + BUTTON */
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  background: #111827;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* MEMBER */
.member {
  background: #111827;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
  <div class="loginBox">
    <h3>👤 Criar Perfil</h3>

    <input id="nameInput" placeholder="Nome">

    <select id="statusInput">
      <option value="online">🟢 Online</option>
      <option value="dnd">🌙 Não incomodar</option>
      <option value="offline">⚫ Offline</option>
    </select>

    <button onclick="createProfile()">Entrar</button>
  </div>
</div>

<!-- 🌐 APP -->
<div id="app">

  <!-- PROFILE -->
  <div class="card">
    <h3>👤 Perfil</h3>

    <p id="profileName">Nome</p>
    <p id="profileStatus">Estado</p>
  </div>

  <!-- LINKS -->
  <div class="card">
    <h3>🔗 Links</h3>

    <button onclick="window.open('https://discord.com','_blank')">
      Discord
    </button>

    <button onclick="window.open('https://youtube.com','_blank')">
      YouTube
    </button>
  </div>

  <!-- MEMBERS -->
  <div class="card">
    <h3>👥 Membros</h3>

    <input id="memberName" placeholder="Username">
    <button onclick="addMember()">Adicionar</button>

    <div id="members"></div>
  </div>

</div>

<script>

let members = JSON.parse(localStorage.getItem("members") || "[]");

/* CREATE PROFILE */
function createProfile() {
  let name = document.getElementById("nameInput").value;
  let status = document.getElementById("statusInput").value;

  if (!name) return;

  localStorage.setItem("username", name);
  localStorage.setItem("status", status);

  loadProfile();

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
}

/* LOAD PROFILE */
function loadProfile() {
  let name = localStorage.getItem("username");
  let status = localStorage.getItem("status");

  document.getElementById("profileName").innerText = "👤 " + name;

  if (status === "online") {
    document.getElementById("profileStatus").innerText = "🟢 Online";
  }

  if (status === "dnd") {
    document.getElementById("profileStatus").innerText = "🌙 Não incomodar";
  }

  if (status === "offline") {
    document.getElementById("profileStatus").innerText = "⚫ Offline";
  }
}

/* MEMBERS */
function addMember() {
  let name = document.getElementById("memberName").value;
  if (!name) return;

  members.push(name);
  localStorage.setItem("members", JSON.stringify(members));

  document.getElementById("memberName").value = "";

  render();
}

function render() {
  let box = document.getElementById("members");
  box.innerHTML = "";

  members.forEach(m => {
    let div = document.createElement("div");
    div.className = "member";
    div.innerText = "@ " + m;
    box.appendChild(div);
  });
}

render();

/* AUTO LOGIN */
window.onload = function () {
  let name = localStorage.getItem("username");

  if (name) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadProfile();
  }
};

</script>

</body>
</html>
