<!DOCTYPE html>
<html>
<head>
  <title>FPS Boost Launcher</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0f1c;
      color: white;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 220px;
      height: 100%;
      background: #0f172a;
      padding: 20px;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .nav button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1e293b;
      color: white;
      transition: 0.2s;
    }

    .nav button:hover {
      background: #3b82f6;
    }

    /* MAIN */
    .main {
      margin-left: 240px;
      padding: 30px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      backdrop-filter: blur(10px);
    }

    button {
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover { transform: scale(1.05); }

    .green { background: #22c55e; }
    .blue { background: #3b82f6; }
    .red { background: #ef4444; }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border-radius: 6px;
      border: none;
      background: #111827;
      color: white;
    }

    /* SKIN SWITCH */
    .skin-dark { background: #0a0f1c; }
    .skin-light { background: #f1f5f9; color: black; }

    /* FLOATING ICONS */
    .icon {
      position: absolute;
      font-size: 20px;
      opacity: 0.2;
      animation: float 6s infinite linear;
    }

    @keyframes float {
      from { transform: translateY(100vh); }
      to { transform: translateY(-10vh); }
    }

    /* FPS DISPLAY */
    .fps {
      font-size: 18px;
      color: #22c55e;
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">🥔 FPS Launcher</div>

  <div class="nav">
    <button onclick="switchTab('home')">Home</button>
    <button onclick="switchTab('boost')">Boost</button>
    <button onclick="switchTab('reviews')">Reviews</button>
    <button onclick="toggleSkin()">Change Theme</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- HOME -->
  <div id="home">
    <div class="card">
      <h2>Welcome 👋</h2>
      <p>This is a FPS Boost Launcher UI (Steam style)</p>
    </div>
  </div>

  <!-- BOOST -->
  <div id="boost" style="display:none;">
    <div class="card">
      <h3>⚡ Boost Modes</h3>
      <button class="green" onclick="setFPS(80)">🥔 Potato Mode</button>
      <button class="blue" onclick="setFPS(40)">⚖️ Balanced Mode</button>
      <p class="fps" id="fps">FPS Boost: 0%</p>
    </div>
  </div>

  <!-- REVIEWS -->
  <div id="reviews" style="display:none;">
    <div class="card">
      <h3>💬 Reviews</h3>

      <input id="name" placeholder="Name">
      <input id="text" placeholder="Opinion">

      <button class="green" onclick="add()">Submit</button>

      <div id="list"></div>
    </div>
  </div>

</div>

<script>

/* FLOATING ICONS */
for (let i = 0; i < 15; i++) {
  let d = document.createElement("div");
  d.className = "icon";
  d.innerText = "⚡";
  d.style.left = Math.random() * window.innerWidth + "px";
  d.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(d);
}

/* TABS */
function switchTab(tab) {
  document.getElementById("home").style.display = "none";
  document.getElementById("boost").style.display = "none";
  document.getElementById("reviews").style.display = "none";

  document.getElementById(tab).style.display = "block";
}

/* SKIN */
function toggleSkin() {
  document.body.classList.toggle("skin-light");
}

/* FPS */
function setFPS(v) {
  document.getElementById("fps").innerText = "FPS Boost: +" + v + "%";
}

/* REVIEWS */
function add() {
  let n = document.getElementById("name").value;
  let t = document.getElementById("text").value;

  if (!n || !t) return;

  let div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <b>${n}</b><br>${t}<br>
    <button class="red" onclick="this.parentElement.remove()">Delete</button>
  `;

  document.getElementById("list").appendChild(div);
}

</script>

</body>
</html>
