<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f17;
  color: white;
}

/* HEADER */
header {
  padding: 20px;
  text-align: center;
  background: #111827;
  font-size: 20px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 700px;
  margin: auto;
  padding: 15px;
}

/* CARD */
.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  text-align: center;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.discord { background: #5865F2; color: white; }
.youtube { background: #ef4444; color: white; }
.join { background: #22c55e; color: white; }

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 6px;
  border: none;
  background: #0f172a;
  color: white;
}

.list {
  margin-top: 10px;
  text-align: left;
  font-size: 14px;
}

.item {
  background: #0f172a;
  padding: 8px;
  margin-top: 5px;
  border-radius: 6px;
}

</style>
</head>

<body>

<header>🌐 Community Hub</header>

<div class="container">

  <!-- LINKS -->
  <div class="card">
    <h3>🔗 Liga-te à comunidade</h3>

    <button class="discord" onclick="window.open('https://discord.com','_blank')">
      Entrar no Discord
    </button>

    <button class="youtube" onclick="window.open('https://youtube.com','_blank')">
      Ir ao YouTube
    </button>
  </div>

  <!-- INSCRIÇÃO -->
  <div class="card">
    <h3>📩 Inscreve-te na comunidade</h3>

    <input id="name" placeholder="O teu nome">
    <button class="join" onclick="join()">Inscrever</button>

    <div class="list" id="list"></div>
  </div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users") || "[]");

function join() {
  let name = document.getElementById("name").value;
  if (!name) return;

  users.push(name);
  localStorage.setItem("users", JSON.stringify(users));

  document.getElementById("name").value = "";

  render();
}

function render() {
  let box = document.getElementById("list");
  box.innerHTML = "";

  users.forEach(u => {
    let div = document.createElement("div");
    div.className = "item";
    div.innerText = "👤 " + u;
    box.appendChild(div);
  });
}

render();

</script>

</body>
</html>
