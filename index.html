<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Links</title>

<style>
:root{
  --bg1:#0b0f17;
  --bg2:#111a2e;
  --card:rgba(255,255,255,0.06);
  --text:#ffffff;
  --accent:#4f7cff;
}

body.light{
  --bg1:#f4f6fb;
  --bg2:#e7ebf5;
  --card:rgba(255,255,255,0.85);
  --text:#111111;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:system-ui, Arial, sans-serif;
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;

  background:linear-gradient(
    135deg,
    var(--bg1),
    var(--bg2)
  );

  transition:0.35s ease;
}

/* background glow */
body::before{
  content:"";
  position:absolute;
  width:550px;
  height:550px;
  background:var(--accent);
  border-radius:50%;
  filter:blur(180px);
  opacity:0.25;
  top:-180px;
  left:-180px;
  animation:float 10s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translate(0,0);}
  50%{transform:translate(40px,20px);}
  100%{transform:translate(0,0);}
}

.container{
  position:relative;
  z-index:1;
  text-align:center;
  animation:fade 0.6s ease;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.title{
  font-size:28px;
  font-weight:700;
  margin-bottom:10px;
}

.status{
  margin-bottom:22px;
  font-size:14px;
  opacity:0.75;
}

.links{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.card{
  width:280px;
  padding:17px;
  border:none;
  border-radius:18px;

  background:var(--card);
  color:var(--text);

  text-decoration:none;
  font-size:15px;
  font-weight:500;

  backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,0.08);

  transition:
    transform .22s ease,
    border-color .22s ease,
    box-shadow .22s ease,
    background .22s ease;

  cursor:pointer;
}

.card:hover{
  transform:translateY(-4px) scale(1.02);
  border-color:var(--accent);

  box-shadow:
    0 10px 35px rgba(0,0,0,0.25),
    0 0 20px color-mix(in srgb, var(--accent) 35%, transparent);
}

.settings{
  position:fixed;
  top:16px;
  right:16px;
  z-index:5;
}

.gear{
  width:44px;
  height:44px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:14px;
  cursor:pointer;

  background:var(--card);
  backdrop-filter:blur(10px);

  border:1px solid rgba(255,255,255,0.08);

  transition:.2s ease;
}

.gear:hover{
  border-color:var(--accent);
  transform:rotate(20deg);
}

.panel{
  margin-top:10px;
  width:170px;

  display:none;

  background:var(--card);
  backdrop-filter:blur(14px);

  padding:12px;
  border-radius:16px;

  border:1px solid rgba(255,255,255,0.08);

  animation:panelFade .2s ease;
}

@keyframes panelFade{
  from{
    opacity:0;
    transform:translateY(-6px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.panel button,
.panel select{
  width:100%;
  margin-top:8px;
  padding:9px;

  border:none;
  border-radius:10px;

  background:rgba(255,255,255,0.08);
  color:var(--text);

  cursor:pointer;
}

#toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);

  background:var(--card);
  color:var(--text);

  padding:12px 18px;
  border-radius:14px;

  border:1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(14px);

  opacity:0;
  pointer-events:none;

  transition:.3s ease;
}

#toast.show{
  opacity:1;
}

@media (max-width:600px){

  .card{
    width:90vw;
  }

}
</style>
</head>

<body>

<div class="container">

  <div class="title">
    Links rápidos
  </div>

  <div class="status">
    🟢 online
  </div>

  <div class="links">

    <a
      class="card"
      href="https://discord.gg/TEU-LINK"
      target="_blank"
    >
      💬 Discord
    </a>

    <button
      class="card"
      onclick="copyDiscord()"
    >
      📋 Copiar link Discord
    </button>

    <a
      class="card"
      href="https://github.com/"
      target="_blank"
    >
      🐙 GitHub
    </a>

  </div>

</div>

<!-- SETTINGS -->
<div class="settings">

  <div
    class="gear"
    onclick="togglePanel()"
  >
    ⚙️
  </div>

  <div
    class="panel"
    id="panel"
  >

    <button onclick="toggleTheme()">
      Tema claro/escuro
    </button>

    <select onchange="changeColor(this.value)">
      <option value="#4f7cff">Azul</option>
      <option value="#ff4f4f">Vermelho</option>
      <option value="#4fff7c">Verde</option>
      <option value="#b84fff">Roxo</option>
      <option value="#ff9f1c">Laranja</option>
    </select>

  </div>

</div>

<div id="toast">
  ✅ Copiado!
</div>

<script>
const root = document.documentElement;
const panel = document.getElementById("panel");

/* LOAD THEME */
if(localStorage.getItem("theme") === "light"){
  document.body.classList.add("light");
}

/* LOAD COLOR */
const savedColor = localStorage.getItem("color");

if(savedColor){
  root.style.setProperty("--accent", savedColor);
}

/* THEME */
function toggleTheme(){

  document.body.classList.toggle("light");

  localStorage.setItem(
    "theme",
    document.body.classList.contains("light")
      ? "light"
      : "dark"
  );

}

/* COLOR */
function changeColor(color){

  root.style.setProperty("--accent", color);

  localStorage.setItem(
    "color",
    color
  );

}

/* SETTINGS PANEL */
function togglePanel(){

  if(panel.style.display === "block"){
    panel.style.display = "none";
  } else {
    panel.style.display = "block";
  }

}

/* CLOSE SETTINGS IF CLICK OUTSIDE */
document.addEventListener("click", (e)=>{

  if(!e.target.closest(".settings")){
    panel.style.display = "none";
  }

});

/* COPY DISCORD */
function copyDiscord(){

  const discordLink =
    "https://discord.gg/TEU-LINK";

  navigator.clipboard.writeText(discordLink);

  const toast =
    document.getElementById("toast");

  toast.classList.add("show");

  setTimeout(()=>{

    toast.classList.remove("show");

  }, 2000);

}
</script>

</body>
</html>
