<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Hub</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  background: radial-gradient(circle at top, #111827, #0b0f17);
  color: white;
  transition: 0.3s;
}

/* HEADER */
header {
  text-align: center;
  padding: 22px;
  font-size: 24px;
  font-weight: bold;
  letter-spacing: 1px;
}

/* CONTAINER */
.container {
  max-width: 800px;
  margin: auto;
  padding: 15px;
}

/* GLASS CARD */
.card {
  background: rgba(31, 41, 55, 0.75);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #3b82f6, #6366f1);
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.02);
  opacity: 0.9;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #111827;
  color: white;
  outline: none;
}

/* MEMBER */
.member {
  background: rgba(17, 24, 39, 0.8);
  padding: 10px;
  border-radius: 12px;
  margin-top: 8px;
  transition: 0.2s;
}

.member:hover {
  transform: translateX(4px);
}

/* LIGHT MODE */
.light {
  background: #f3f4f6;
  color: black;
}

.light .card {
  background: white;
  color: black;
}

.light input {
  background: #e5e7eb;
  color: black;
}

.light .member {
  background: #e5e7eb;
}
</style>
</head>

<body>

<header>Community Hub</header>

<div class="container">

  <!-- LINKS -->
  <div class="card">
    <h3>🔗 Liga-te</h3>

    <button onclick="window.open('https://discord.com','_blank')">
      Discord
    </button>

    <button onclick="window.open('https://youtube.com','_blank')">
      YouTube
    </button>

    <button onclick="openSettings()">⚙️ Definições</button>
  </div>

  <!-- MEMBERS -->
  <div class="card">
    <h3>👥 Membros</h3>

    <input id="memberName" placeholder="Username">
    <button onclick="addMember()">Adicionar</button>

    <div id="members"></div>
  </div>

  <!-- SETTINGS -->
  <div class="card hidden" id="settings">
    <h3>⚙️ Definições</h3>

    <button onclick="toggleTheme()">🌙 / ☀️ Modo Escuro</button>
    <button onclick="closeSettings()">🔙 Voltar</button>
  </div>

</div>

<script>

let members = JSON.parse(localStorage.getItem("members") || "[]");
let dark = true;

/* ADD MEMBER */
function addMember() {
  let name = document.getElementById("memberName").value;
  if (!name) return;

  members.push({ name });
  localStorage.setItem("members", JSON.stringify(members));

  document.getElementById("memberName").value = "";

  render();
}

/* RENDER */
function render() {
  let box = document.getElementById("members");
  box.innerHTML = "";

  members.forEach(m => {
    let div = document.createElement("div");
    div.className = "member";
    div.innerText = "@ " + m.name;
    box.appendChild(div);
  });
}

render();

/* SETTINGS NAV */
function openSettings() {
  document.querySelectorAll(".card")[0].style.display = "none";
  document.querySelectorAll(".card")[1].style.display = "none";
  document.getElementById("settings").classList.remove("hidden");
}

function closeSettings() {
  document.getElementById("settings").classList.add("hidden");
  document.querySelectorAll(".card")[0].style.display = "block";
  document.querySelectorAll(".card")[1].style.display = "block";
}

/* THEME */
function toggleTheme() {
  document.body.classList.toggle("light");
}

</script>

</body>
</html>
