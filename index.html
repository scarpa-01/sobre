<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links</title>

<style>
  :root {
    --bg: #0b0f17;
    --card: rgba(255,255,255,0.06);
    --text: #ffffff;
    --accent: #4f7cff;
  }

  body.light {
    --bg: #f5f6fa;
    --card: #ffffff;
    --text: #111;
  }

  body {
    margin: 0;
    font-family: system-ui, Arial;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    transition: 0.3s ease;
  }

  .container {
    text-align: center;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .title {
    font-size: 22px;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card {
    width: 240px;
    padding: 16px;
    border-radius: 14px;
    background: var(--card);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    text-decoration: none;
    color: var(--text);
    transition: 0.2s ease;
    font-weight: 500;
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
  }

  .settings {
    position: fixed;
    top: 15px;
    right: 15px;
  }

  .gear {
    cursor: pointer;
    background: var(--card);
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .panel {
    margin-top: 10px;
    background: var(--card);
    padding: 12px;
    border-radius: 10px;
    display: none;
  }

  button, select {
    margin-top: 6px;
    padding: 6px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="container">
  <div class="title">Links rápidos</div>

  <div class="links">
    <a class="card" href="https://discord.com" target="_blank">💬 Discord</a>
    <a class="card" href="https://github.com" target="_blank">🐙 GitHub</a>
  </div>
</div>

<div class="settings">
  <div class="gear" onclick="togglePanel()">⚙️</div>

  <div class="panel" id="panel">
    <button onclick="toggleTheme()">Tema</button><br>

    <select onchange="changeColor(this.value)">
      <option value="#4f7cff">Azul</option>
      <option value="#ff4f4f">Vermelho</option>
      <option value="#4fff7c">Verde</option>
      <option value="#b84fff">Roxo</option>
    </select>
  </div>
</div>

<script>
  const root = document.documentElement;

  // load theme
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
  }

  // load color
  const savedColor = localStorage.getItem("color");
  if (savedColor) {
    root.style.setProperty("--accent", savedColor);
  }

  function toggleTheme() {
    document.body.classList.toggle("light");
    localStorage.setItem("theme",
      document.body.classList.contains("light") ? "light" : "dark"
    );
  }

  function changeColor(color) {
    root.style.setProperty("--accent", color);
    localStorage.setItem("color", color);
  }

  function togglePanel() {
    const p = document.getElementById("panel");
    p.style.display = p.style.display === "block" ? "none" : "block";
  }
