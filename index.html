<!DOCTYPE html>
<html>
<head>
  <title>FPS Boost Pack</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0f;
      color: white;
    }

    .banner {
      background: linear-gradient(90deg, #0f172a, #1e293b);
      padding: 60px 20px;
      text-align: center;
    }

    .title {
      font-size: 36px;
      font-weight: bold;
    }

    .subtitle {
      opacity: 0.7;
      margin-top: 5px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1c1c25;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .green { background: #22c55e; color: white; }
    .blue { background: #3b82f6; color: white; }

    .tag {
      display: inline-block;
      background: #333;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      margin-top: 10px;
    }

    .reviews {
      margin-top: 20px;
      display: grid;
      gap: 10px;
    }

    .review {
      background: #15151d;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0.9;
    }

    .stars {
      color: gold;
    }
  </style>
</head>

<body>

<div class="banner">
  <div class="title">🥔 FPS Boost Pack</div>
  <div class="subtitle">Optimize Roblox performance for low-end PCs</div>
  <div class="tag">Free Tool • Community Configs</div>
</div>

<div class="container">

  <div class="card">
    <h2>⚡ Install / Copy Config</h2>
    <p>Choose your performance mode</p>

    <button class="green" onclick="copyPotato()">🥔 Potato Mode</button>
    <button class="blue" onclick="copyBalanced()">⚖️ Balanced Mode</button>
  </div>

  <div class="card">
    <h3>📊 Reviews</h3>

    <div class="reviews">
      <div class="review">
        <span class="stars">★★★★★</span><br>
        “My FPS went from 30 to 80 on my old laptop”
      </div>

      <div class="review">
        <span class="stars">★★★★☆</span><br>
        “Very useful for battleground games”
      </div>

      <div class="review">
        <span class="stars">★★★★★</span><br>
        “Simple and actually works for lag”
      </div>
    </div>
  </div>

</div>

<script>
function copyPotato() {
  prompt("Copy this config:", `
{
  "DFIntTaskSchedulerTargetFps": "60",
  "FIntRenderShadowIntensity": "0",
  "DFIntTextureQualityOverride": "0"
}
  `);
}

function copyBalanced() {
  prompt("Copy this config:", `
{
  "DFIntTaskSchedulerTargetFps": "120",
  "FIntRenderShadowIntensity": "0"
}
  `);
}
</script>

</body>
</html>
