<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Hub</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

body {
  margin: 0;
  background: #0b0f17;
  color: white;
  transition: 0.3s;
}

header {
  text-align: center;
  padding: 18px;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 15px;
}

/* CARD */
.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  background: #111827;
  color: white;
}

/* MEMBER */
.member {
  background: #111827;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
}

/* LINKS BUTTONS */
.discord { background: #5865F2; }
.youtube { background: #ef4444; }

/* LIGHT MODE */
.light {
  background: #f3f4f6;
  color: black;
}

.light .card {
  background: white;
  color: black;
}

.light input {
  background: #e5e7eb;
  color: black;
}

.light .member {
  background: #e5e7eb;
}
</style>
</head>

<body>

<header>Community Hub</header>

<div class="container">

  <!-- LINKS -->
  <div class="card">
    <h3>🔗 Liga-te</h3>

    <button class="discord"
      onclick="window.open('https://discord.com','_blank')">
      Entrar no Discord
    </button>

    <button class="youtube"
      onclick="window.open('https://youtube.com','_blank')">
      Ir ao YouTube
    </button>
  </div>

  <!-- SETTINGS -->
  <div class="card">
    <h3>⚙️ Definições</h3>

    <button onclick="toggleTheme()">🌙 / ☀️ Modo Escuro</button>

    <p style="margin-top:10px;">
      ℹ️ Este site é um hub simples para comunidade, links e membros.
    </p>
  </div>

  <!-- ADD MEMBER -->
  <div class="card">
    <h3>Adicionar membro</h3>
    <input id="memberName" placeholder="Username">
    <button onclick="addMember()">Adicionar</button>
  </div>

  <!-- MEMBERS -->
  <div class="card">
    <h3>Membros</h3>
    <div id="members"></div>
  </div>

</div>

<script>

let members = JSON.parse(localStorage.getItem("members") || "[]");

/* THEME */
function toggleTheme() {
  document.body.classList.toggle("light");
}

/* ADD MEMBER */
function addMember() {
  let name = document.getElementById("memberName").value;
  if (!name) return;

  members.push({ name });
  localStorage.setItem("members", JSON.stringify(members));

  document.getElementById("memberName").value = "";

  render();
}

/* RENDER */
function render() {
  let box = document.getElementById("members");
  box.innerHTML = "";

  members.forEach(m => {
    let div = document.createElement("div");
    div.className = "member";
    div.innerText = "@ " + m.name;
    box.appendChild(div);
  });
}

render();

</script>

</body>
</html>
