<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Links</title>

<style>
:root{
  --bg1:#0b0f17;
  --bg2:#111a2e;
  --card:rgba(255,255,255,0.06);
  --text:#fff;
  --accent:#4f7cff;
}

body.light{
  --bg1:#f5f6fa;
  --bg2:#e9ecf5;
  --card:rgba(255,255,255,0.85);
  --text:#111;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:system-ui;
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
}

/* 🌌 PARTICLES */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* 💫 glow blob */
body::before{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:var(--accent);
  border-radius:50%;
  filter:blur(200px);
  opacity:.18;
  top:-200px;
  left:-200px;
  animation:move 12s ease-in-out infinite;
}

@keyframes move{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(60px,40px);}
}

/* MAIN */
.container{
  position:relative;
  z-index:2;
  text-align:center;
  animation:fade .6s ease;
}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

.title{
  font-size:32px;
  font-weight:700;
}

.status{
  margin:10px 0 22px;
  opacity:.7;
  font-size:14px;
}

/* LINKS */
.links{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.card{
  width:290px;
  padding:16px;
  border-radius:16px;

  background:var(--card);
  backdrop-filter:blur(16px);

  border:1px solid rgba(255,255,255,0.08);

  color:var(--text);
  text-decoration:none;

  cursor:pointer;

  transition:
    transform .2s ease,
    box-shadow .2s ease,
    border-color .2s ease;
}

/* ✨ premium hover */
.card:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
  box-shadow:0 15px 40px rgba(0,0,0,.3);
}

/* SETTINGS */
.settings{
  position:fixed;
  top:16px;
  right:16px;
  z-index:3;
}

.gear{
  width:44px;
  height:44px;
  display:flex;
  justify-content:center;
  align-items:center;
  border-radius:12px;
  background:var(--card);
  backdrop-filter:blur(12px);
  cursor:pointer;
  transition:.2s ease;
}

.gear:hover{
  transform:rotate(25deg);
  border:1px solid var(--accent);
}

/* smoother panel */
.panel{
  margin-top:10px;
  display:none;
  background:var(--card);
  padding:12px;
  border-radius:14px;
  backdrop-filter:blur(16px);
  animation:panel .2s ease;
}

@keyframes panel{
  from{opacity:0; transform:translateY(-8px);}
  to{opacity:1; transform:translateY(0);}
}

.panel button{
  width:100%;
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* 📱 mobile */
@media (max-width:600px){
  .card{
    width:90vw;
  }
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

  <div class="title">Links rápidos</div>
  <div class="status">🟢 online</div>

  <div class="links">

    <a class="card" href="https://discord.gg/TEU-LINK" target="_blank">
      💬 Discord
    </a>

    <a class="card" href="https://github.com/scarpa-01" target="_blank">
      🐙 GitHub
    </a>

  </div>

</div>

<!-- SETTINGS -->
<div class="settings">

  <div class="gear" onclick="togglePanel()">⚙️</div>

  <div class="panel" id="panel">
    <button onclick="toggleTheme()">Tema claro/escuro</button>
  </div>

</div>

<script>

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* PANEL */
function togglePanel(){
  const p = document.getElementById("panel");
  p.style.display = p.style.display === "block" ? "none" : "block";
}

/* 🌌 CLEAN PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let particles = [];

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener("resize", resize);
resize();

for(let i=0;i<45;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*1.8,
    dx:(Math.random()-0.5)*0.25,
    dy:(Math.random()-0.5)*0.25
  });
}

function animate(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let p of particles){

    p.x += p.dx;
    p.y += p.dy;

    if(p.x<0) p.x=canvas.width;
    if(p.x>canvas.width) p.x=0;
    if(p.y<0) p.y=canvas.height;
    if(p.y>canvas.height) p.y=0;

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.25)";
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
