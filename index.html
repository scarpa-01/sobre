<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Links</title>

<style>
  :root {
    --bg1: #0b0f17;
    --bg2: #111a2e;
    --card: rgba(255,255,255,0.06);
    --text: #ffffff;
    --accent: #4f7cff;
  }

  body.light {
    --bg1: #f5f6fa;
    --bg2: #e9ecf5;
    --card: rgba(255,255,255,0.85);
    --text: #111;
  }

  body {
    margin: 0;
    font-family: system-ui, Arial;
    color: var(--text);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(120deg, var(--bg1), var(--bg2));
    transition: 0.4s ease;
    overflow: hidden;
  }

  /* glow */
  body::before {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: var(--accent);
    filter: blur(160px);
    opacity: 0.25;
    top: -120px;
    left: -120px;
  }

  .container {
    text-align: center;
    z-index: 1;
    animation: fade 0.6s ease;
  }

  @keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
  }

  .title {
    font-size: 26px;
    margin-bottom: 20px;
    font-weight: 600;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card {
    width: 270px;
    padding: 16px;
    border-radius: 16px;
    background: var(--card);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    text-decoration: none;
    color: var(--text);
    transition: 0.25s ease;
    font-weight: 500;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  }

  /* SETTINGS */
  .settings {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 2;
  }

  .gear {
    cursor: pointer;
    padding: 10px 12px;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }

  .panel {
    margin-top: 10px;
    display: none;
    background: var(--card);
    padding: 12px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    min-width: 140px;
  }

  button, select {
    margin-top: 8px;
    padding: 7px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    width: 100%;
  }
</style>
</head>

<body>

<div class="container">
  <div class="title">Links rápidos</div>

  <div class="links">
    <a class="card" href="https://discord.com" target="_blank">💬 Discord</a>
    <a class="card" href="https://github.com" target="_blank">🐙 GitHub</a>
  </div>
</div>

<!-- SETTINGS -->
<div class="settings">
  <div class="gear" onclick="togglePanel()">⚙️</div>

  <div class="panel" id="panel">
    <button onclick="toggleTheme()">Tema claro/escuro</button>

    <select onchange="changeColor(this.value)">
      <option value="#4f7cff">Azul</option>
      <option value="#ff4f4f">Vermelho</option>
      <option value="#4fff7c">Verde</option>
      <option value="#b84fff">Roxo</option>
    </select>
  </div>
</div>

<script>
  const root = document.documentElement;
  const panel = document.getElementById("panel");

  // LOAD THEME
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
  }

  // LOAD COLOR
  const savedColor = localStorage.getItem("color");
  if (savedColor) {
    root.style.setProperty("--accent", savedColor);
  }

  // TOGGLE THEME
  function toggleTheme() {
    document.body.classList.toggle("light");

    localStorage.setItem(
      "theme",
      document.body.classList.contains("light") ? "light" : "dark"
    );
  }

  // CHANGE COLOR (FIXED)
  function changeColor(color) {
    root.style.setProperty("--accent", color);
    localStorage.setItem("color", color);
  }

  // TOGGLE SETTINGS PANEL (SMOOTH)
  function togglePanel() {
    if (panel.style.display === "block") {
      panel.style.display = "none";
    } else {
      panel.style.display = "block";
    }
  }

  // close panel if click outside
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".settings")) {
      panel.style.display = "none";
    }
  });
</script>

</body>
</html>
